name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: .
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source files
        run: python -m compileall backend tests

      - name: Run test suite
        run: pytest tests/ -q -m "not mysql_integration"

  mysql-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: .
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      DATABASE_URL: mysql+pymysql://seemusic_app:seemusic_pwd@127.0.0.1:3306/SeeMusic?charset=utf8mb4
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: SeeMusic
          MYSQL_USER: seemusic_app
          MYSQL_PASSWORD: seemusic_pwd
          MYSQL_ROOT_PASSWORD: root_pwd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot_pwd"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cryptography

      - name: Wait for MySQL service
        run: |
          python - <<'PY'
          import time
          import pymysql

          for attempt in range(30):
              try:
                  connection = pymysql.connect(
                      host="127.0.0.1",
                      port=3306,
                      user="seemusic_app",
                      password="seemusic_pwd",
                      database="SeeMusic",
                  )
                  with connection.cursor() as cursor:
                      cursor.execute("SELECT 1")
                      assert cursor.fetchone() == (1,)
                  connection.close()
                  print("MySQL service is ready.")
                  break
              except Exception as exc:
                  if attempt == 29:
                      raise
                  print(f"MySQL not ready yet ({attempt + 1}/30): {exc}")
                  time.sleep(2)
          PY

      - name: Compile source files
        run: python -m compileall backend tests

      - name: Run MySQL integration tests
        run: pytest tests/test_mysql_integration.py -q

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs:
      - test
      - mysql-integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          set -euo pipefail
          : "${SSH_HOST:?Missing SSH_HOST repository secret}"
          : "${SSH_USER:?Missing SSH_USER repository secret}"
          : "${SSH_PRIVATE_KEY:?Missing SSH_PRIVATE_KEY repository secret}"
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/seemusic_deploy_key
          chmod 600 ~/.ssh/seemusic_deploy_key
          ssh-keyscan -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Build deployment archive
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='Music' \
            --exclude='storage' \
            --exclude='scratch' \
            --exclude='tmp_audio_test' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            -czf /tmp/seemusic-${GITHUB_SHA}.tar.gz .

      - name: Upload deployment archive
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          scp -P "${SSH_PORT}" -i ~/.ssh/seemusic_deploy_key \
            /tmp/seemusic-${GITHUB_SHA}.tar.gz \
            "${SSH_USER}@${SSH_HOST}:/tmp/seemusic-${GITHUB_SHA}.tar.gz"

      - name: Restart production service
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/srv/seemusic}"
          ssh -p "${SSH_PORT}" -i ~/.ssh/seemusic_deploy_key "${SSH_USER}@${SSH_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' ARCHIVE='/tmp/seemusic-${GITHUB_SHA}.tar.gz' bash -s" <<'REMOTE'
          set -euo pipefail
          mkdir -p "${DEPLOY_PATH}"
          tar -xzf "${ARCHIVE}" -C "${DEPLOY_PATH}"
          rm -f "${ARCHIVE}"
          cd "${DEPLOY_PATH}"

          if [ ! -f .env ]; then
            echo "Missing ${DEPLOY_PATH}/.env; keep production secrets on the server." >&2
            exit 1
          fi

          mkdir -p storage/avatars storage/reference_audio storage/logs storage/exports storage/numba_cache
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip setuptools wheel
          .venv/bin/python -m pip install --no-cache-dir -r requirements.txt

          sudo systemctl restart seemusic.service
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8000/health; then
              echo
              break
            fi
            if [ "${attempt}" = "30" ]; then
              sudo journalctl -u seemusic.service -n 80 --no-pager
              exit 1
            fi
            sleep 2
          done
          curl --fail --silent --show-error http://127.0.0.1/health
          echo
          REMOTE
