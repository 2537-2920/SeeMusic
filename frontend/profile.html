<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>个人中心 - SeeMusic</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<link rel="stylesheet" href="profile.css?v=2"/>
</head>
<body class="p-8 md:p-12">

<header class="w-full px-12 mx-auto mb-12 flex justify-between items-end">
<div class="flex items-center gap-6">
<a class="flex items-center gap-2 group" href="index.html">
<div class="w-10 h-10 bg-[#457b9d] rounded flex items-center justify-center text-white transition-all duration-300 group-hover:rotate-12 group-hover:scale-110">
<iconify-icon class="text-xl" icon="solar:music-note-bold"></iconify-icon>
</div>
<span class="text-2xl font-bold tracking-tight text-[#1d3557] hidden sm:block">SeeMusic</span>
</a>
<div class="h-10 w-[1px] bg-gray-300 mx-2"></div>
<div>
<h1 class="text-4xl font-bold tracking-tight text-gray-800">个人中心</h1>
<p class="text-sm text-gray-400 mt-1 uppercase tracking-widest">User Profile &amp; History</p>
</div>
</div>
<div class="text-right text-xs text-gray-400 font-medium">
<p>LAST UPDATE</p>
<p class="text-gray-600" id="profile-last-update">--</p>
</div>
</header>

<main class="w-full px-12 mx-auto">
<p class="hidden mb-8 text-sm rounded-2xl px-5 py-4" id="profile-status"></p>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
<div class="lg:col-span-1 flex flex-col gap-8">
<section class="card flex flex-col items-center text-center">
<div class="relative group">
<img alt="Avatar" class="w-32 h-32 rounded-full border-4 border-white shadow-lg mb-4" id="profile-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Music"/>
<button class="absolute bottom-4 right-0 bg-white p-2 rounded-full shadow-md text-gray-500 hover:text-[#457b9d] transition-colors" id="refresh-profile-btn" type="button">
<iconify-icon icon="solar:refresh-bold"></iconify-icon>
</button>
</div>
        <div class="flex items-center justify-center gap-2 mb-1">
            <h2 class="text-2xl font-bold" id="profile-name">未登录用户</h2>
            <button id="open-edit-modal-btn" class="p-1.5 rounded-lg text-gray-300 hover:text-[#457b9d] hover:bg-[#457b9d]/5 transition-all" title="修改个人详情">
                <iconify-icon icon="solar:pen-new-square-bold-duotone" class="text-xl"></iconify-icon>
            </button>
        </div>
        <!-- 简介区域 -->
        <p class="text-xs text-gray-500 mb-3 px-4 italic line-clamp-2" id="profile-bio">还没有填写个人简介...</p>
        
        <!-- 音乐倾向标签 -->
        <div class="flex flex-wrap justify-center gap-1.5 mb-6 px-4" id="profile-taste-tags">
            <!-- 动态生成 -->
        </div>

<p class="text-gray-400 text-sm mb-6" id="profile-email">登录后可查看数据库中的个人记录</p>
<div class="w-full flex justify-around border-t border-gray-100 pt-6">
<div>
<p class="text-xl font-bold text-[#457b9d]" id="stat-audio">0</p>
<p class="text-[10px] text-gray-400 uppercase">音频分析</p>
</div>
<div>
<p class="text-xl font-bold text-[#457b9d]" id="stat-report">0</p>
<p class="text-[10px] text-gray-400 uppercase">报告导出</p>
</div>
<div>
<p class="text-xl font-bold text-[#457b9d]" id="stat-score">0</p>
<p class="text-[10px] text-gray-400 uppercase">乐谱操作</p>
</div>
</div>
<button class="mt-8 w-full py-3 rounded-xl bg-gray-50 text-gray-600 font-medium hover:bg-gray-100 transition-colors flex items-center justify-center gap-2" id="session-action-btn" type="button">
<iconify-icon icon="solar:login-2-linear"></iconify-icon> <span id="session-action-text">前往登录</span>
                </button>
</section>

<section class="card">
<h3 class="section-title text-lg">
<iconify-icon icon="solar:shield-check-bold-duotone"></iconify-icon> 账号安全
                </h3>
<div class="space-y-4">
<div class="flex justify-between items-center text-sm">
<span class="text-gray-500">登录状态</span>
<span class="bg-gray-100 text-gray-500 px-2 py-0.5 rounded text-[10px]" id="security-login-state">未登录</span>
</div>
<div class="flex justify-between items-center text-sm">
<span class="text-gray-500">当前用户 ID</span>
<span class="text-[#457b9d] font-medium" id="security-user-id">--</span>
</div>
<div class="flex justify-between items-center text-sm">
<span class="text-gray-500">历史记录总数</span>
<span class="text-[#457b9d] font-medium" id="security-history-count">0</span>
</div>
</div>
</section>
</div>

<div class="lg:col-span-2 flex flex-col gap-8">

<section class="card">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
        <h3 class="section-title mb-0">
            <iconify-icon icon="solar:history-bold-duotone"></iconify-icon> 历史看板
        </h3>
        <!-- 功能模块分类切换与搜索 -->
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
            <div class="relative w-full sm:w-64 group">
                <iconify-icon icon="solar:magnifer-linear" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 transition-colors group-focus-within:text-[#457b9d]"></iconify-icon>
                <input type="text" id="history-search-input" placeholder="搜索识谱项目或测评记录..." class="w-full bg-gray-100/50 border border-transparent rounded-2xl py-2.5 pl-10 pr-10 text-xs outline-none focus:bg-white focus:border-[#457b9d]/30 focus:ring-4 focus:ring-[#457b9d]/5 transition-all shadow-sm"/>
                <button id="clear-search-btn" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 hover:text-red-400 opacity-0 pointer-events-none transition-all">
                    <iconify-icon icon="solar:close-circle-bold" class="text-base"></iconify-icon>
                </button>
            </div>
            <div class="flex p-1.5 bg-gray-100/50 rounded-2xl border border-gray-100" id="history-filter-tabs">
                <button class="history-tab active" data-filter="all">全部</button>
                <button class="history-tab" data-filter="transcription">识谱转谱</button>
                <button class="history-tab" data-filter="evaluation">唱歌测评</button>
                <button class="history-tab" data-filter="community">社区贡献</button>
            </div>
        </div>
    </div>
    <div id="search-status-bar" class="hidden mt-4 pb-2 border-b border-gray-50 flex items-center justify-between">
        <div class="flex items-center gap-2 text-[10px] text-gray-400 uppercase tracking-widest font-black">
            <iconify-icon icon="solar:magnifer-zoom-in-bold-duotone" class="text-blue-400 text-sm"></iconify-icon>
            <span id="search-count-text">正在搜索记录...</span>
        </div>
        <button id="exit-search-btn" class="text-[9px] text-red-400 font-bold hover:underline">退出搜索</button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="history-list">
        <!-- 动态生成：根据不同模块展示不同样式的详情卡片 -->
        <div class="col-span-full rounded-2xl border border-dashed border-gray-200 p-12 text-center text-sm text-gray-400">
            正在加载您的音乐足迹...
        </div>
    </div>
</section>
</div>
</div>
</main>

<footer class="mt-12 text-center text-gray-300 text-xs pb-12">
<p>© 2026 SeeMusic Studio. All Rights Reserved.</p>
</footer>

<!-- 个人详情修改弹窗 (毛玻璃风格) -->
<div id="edit-profile-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">
    <div class="absolute inset-0 bg-[#1d3557]/20 backdrop-blur-md" id="edit-modal-overlay"></div>
    <div class="relative w-full max-w-md bg-white/80 backdrop-blur-xl rounded-[32px] shadow-2xl border border-white/50 p-8 transform scale-95 transition-all duration-300 overflow-hidden">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h3 class="text-xl font-bold text-[#1d3557]">完善个人细节</h3>
                <p class="text-xs text-gray-500 mt-1">你的主页，由你定义</p>
            </div>
            <button class="w-10 h-10 rounded-full bg-gray-100/50 flex items-center justify-center text-gray-400 hover:text-red-400 transition-colors" id="close-edit-modal-btn">
                <iconify-icon icon="solar:close-circle-bold-duotone" class="text-2xl"></iconify-icon>
            </button>
        </div>

        <form id="edit-profile-form" class="space-y-6">
            <!-- 头像更换区域 -->
            <div class="flex flex-col items-center mb-6">
                <div class="relative group cursor-pointer" id="avatar-upload-trigger">
                    <div class="w-24 h-24 rounded-full border-4 border-white shadow-lg overflow-hidden transition-transform group-hover:scale-105">
                        <img id="edit-avatar-preview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-full h-full object-cover"/>
                    </div>
                    <div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <iconify-icon icon="solar:camera-bold" class="text-white text-2xl"></iconify-icon>
                    </div>
                </div>
                <input type="file" id="avatar-file-input" class="hidden" accept="image/*"/>
                <p class="text-[9px] text-gray-400 mt-2 uppercase font-black tracking-widest">点击圆形区域更换头像</p>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">昵称 / Nickname</label>
                <div class="relative">
                    <iconify-icon icon="solar:user-circle-bold-duotone" class="absolute left-4 top-1/2 -translate-y-1/2 text-[#457b9d] text-lg"></iconify-icon>
                    <input type="text" id="edit-nickname" class="w-full bg-white/50 border border-gray-100 focus:border-[#457b9d] rounded-2xl py-3 pl-12 pr-4 text-sm outline-none transition-all" placeholder="输入你的大名"/>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">出生日期</label>
                    <input type="date" id="edit-birthday" class="w-full bg-white/50 border border-gray-100 focus:border-[#457b9d] rounded-2xl py-3 px-4 text-xs outline-none transition-all"/>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">年龄 / Age</label>
                    <input type="number" id="edit-age" readonly class="w-full bg-gray-50/50 border border-gray-100 rounded-2xl py-3 px-4 text-sm text-gray-400 outline-none" placeholder="自动计算"/>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">音乐倾向 / Music Taste</label>
                <div class="flex flex-wrap gap-2" id="music-taste-chips">
                    <span class="taste-chip" data-value="Classical">古典</span>
                    <span class="taste-chip" data-value="Pop">流行</span>
                    <span class="taste-chip active" data-value="Jazz">爵士</span>
                    <span class="taste-chip" data-value="Rock">摇滚</span>
                    <span class="taste-chip" data-value="ACG">二次元</span>
                    <span class="taste-chip" data-value="Piano">纯钢琴</span>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">个人简介 / Bio</label>
                <textarea id="edit-bio" class="w-full bg-white/50 border border-gray-100 focus:border-[#457b9d] rounded-2xl py-3 px-4 text-sm outline-none transition-all min-h-[80px]" placeholder="用一句话介绍你的音乐灵魂..."></textarea>
            </div>

            <button type="submit" class="w-full py-4 rounded-2xl bg-gradient-to-r from-[#457b9d] to-[#1d3557] text-white font-bold text-sm shadow-xl shadow-blue-900/10 hover:shadow-blue-900/20 active:scale-[0.98] transition-all mt-4">
                保存修改
            </button>
        </form>
    </div>
</div>

<script src="app_common.js"></script>
<script src="profile.js?v=112"></script>
</body>
</html>
